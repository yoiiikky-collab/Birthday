<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today Is All About You ❤️</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#fff5fa);
min-height:100vh;
overflow-x:hidden;
position:relative;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
inset:-50%;
background:radial-gradient(circle,rgba(255,182,193,0.35),transparent 60%);
animation:bgMove 12s ease-in-out infinite alternate;
z-index:-1;
filter:blur(20px);
}

@keyframes bgMove{
from{transform:translate(-5%,-5%) scale(1);}
to{transform:translate(5%,5%) scale(1.1);}
}

/* INTRO */
#introScreen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ffb6d5,#fff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

#introScreen h1{color:#ff4d88;}

#introScreen button{
padding:12px 25px;
border:none;
border-radius:50px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 20px rgba(255,77,136,0.3);
}

/* CONTAINER */
.container{
max-width:520px;
margin:auto;
padding:20px;
text-align:center;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* GIF UPGRADED */
.cute-video{
width:190px;
height:190px;
object-fit:cover;
border-radius:50%;
margin:20px auto 10px;
box-shadow:0 20px 40px rgba(255,105,180,0.35);
border:4px solid rgba(255,255,255,0.7);
transition:0.4s;
}

.cute-video:hover{
transform:scale(1.05) rotate(-2deg);
}

/* TITLE UPGRADE */
h1{
font-size:32px;
color:#ff4d88;
margin-top:10px;
line-height:1.3;
}

/* GAP DI BAWAH */
.sub{
font-size:17px;
color:#777;
line-height:1.7;
margin-top:8px;
margin-bottom:18px;
}

/* QUOTE */
.intro{
margin:18px auto 30px;
font-size:17px;
color:#ff6f9f;
font-style:italic;
}

/* ENVELOPE */
.envelope{
width:220px;
height:160px;
background:#ff6f9f;
margin:30px auto;
border-radius:20px;
position:relative;
cursor:pointer;
box-shadow:0 15px 30px #ffbfd5;
transition:0.3s ease;
}

.envelope:hover{
transform:scale(1.05);
box-shadow:0 25px 50px rgba(255,105,180,0.4);
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:90px solid #ff9fc0;
}

.text{
position:absolute;
bottom:40px;
width:100%;
color:white;
font-size:24px;
font-weight:bold;
}

/* CARD */
.card{
display:none;
background:rgba(255,255,255,0.78);
backdrop-filter:blur(18px);
padding:25px;
border-radius:40px;
box-shadow:0 20px 60px rgba(255,182,193,0.5);
animation:cardIn 1s ease;
}

@keyframes cardIn{
from{opacity:0;transform:translateY(40px) scale(0.95);}
to{opacity:1;transform:translateY(0) scale(1);}
}

/* TITLE CARD */
h2{
color:#ff4d88;
font-size:22px;
margin-top:15px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:15px;
}

.gallery img{
width:100%;
height:160px;
object-fit:cover;
border-radius:20px;
opacity:0;
transform:scale(.85);
transition:0.5s;
}

.gallery img.show{
opacity:1;
transform:scale(1);
}

.gallery img:hover{
transform:scale(1.06);
filter:brightness(1.15);
}

/* MESSAGE */
.message{
font-size:15px;
line-height:1.9;
color:#555;
text-align:left;
white-space:pre-line;
margin-top:10px;
}

/* HEART */
.heart{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(180deg);}
}

</style>

</head>

<body>

<!-- INTRO -->
<div id="introScreen">
<h1>💖 A Special Surprise</h1>
<button onclick="enterSite()">Tap to Enter 💌</button>
</div>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2b9f7b9c3d.mp3">
</audio>

<div class="container">

<!-- GIF DIGANTI (lebih cute & soft) -->
<img class="cute-video"
src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2F0Z3R5bW5wZ3V6d2Y5Z2F0eG1nZ3l5dGZ3b3R6dG5xY2F3bSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/MDJ9IbxxvDUQM/giphy.gif"
alt="cute love gif">

<h1>
Today Is All About You ❤️
</h1>

<p class="sub">
Untuk seseorang yang selalu berhasil bikin hari-hariku jauh lebih indah ✨
</p>

<div class="intro">
"Kadang aku nggak bisa bilang langsung, tapi kamu selalu jadi alasan senyum aku."
</div>

<div class="envelope" onclick="openLove()">
<div class="text">BUKA 💌</div>
</div>

<div class="card" id="card">

<h2>Happy Birthday ❤️</h2>

<div class="gallery">
<img src="https://www.upload.ee/image/19448284/5184.jpg">
<img src="https://www.upload.ee/image/19448286/5185.jpg">
<img src="https://www.upload.ee/image/19448291/5188.jpg">
<img src="https://www.upload.ee/image/19448292/5189.jpg">
<img src="https://www.upload.ee/image/19448293/5190.jpg">
<img src="https://www.upload.ee/image/19448294/5191.jpg">
</div>

<p class="message" id="typing"></p>

</div>

</div>

<script>

let text =
"Selamat ulang tahun ❤️\n\n" +
"Aku bersyukur kamu hadir di hidup aku.\n" +
"Kamu mungkin nggak sadar, tapi kamu itu berarti banget buat aku.\n\n" +
"Aku harap kamu selalu bahagia, sehat, dan semua yang kamu impikan bisa tercapai.\n\n" +
"Terima kasih sudah jadi bagian paling indah di hari-hariku.\n\n" +
"Aku sayang kamu ❤️";

let i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,40);
}
}

function enterSite(){
document.getElementById("introScreen").style.display="none";
document.getElementById("bgm").play().catch(()=>{});
}

function openLove(){
document.querySelector(".envelope").classList.add("open");

setTimeout(()=>{
document.getElementById("card").style.display="block";
typing();
showPhoto();
},900);
}

function showPhoto(){
document.querySelectorAll(".gallery img")
.forEach((img,index)=>{
setTimeout(()=>img.classList.add("show"),index*250);
});
}

function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["❤️","💖","✨","🌸"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}
setInterval(createHeart,900);

</script>

</body>
</html>
